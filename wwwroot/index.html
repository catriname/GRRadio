<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>GRRadio</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="GRRadio.styles.css" />
    <link rel="icon" href="data:,">
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="js/satellite.min.js"></script>
    <script src="js/satpass.js"></script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>

    <script>
        window.fetchPskReporter = function (callsign, hours) {
            return new Promise(function (resolve, reject) {
                var callbackName = 'pskCallback' + Date.now();
                var since = Math.floor(Date.now() / 1000) - (hours * 3600);
                var url = 'https://retrieve.pskreporter.info/query' +
                    '?senderCallsign=' + encodeURIComponent(callsign) +
                    '&appcontact=catrina@k5grr.com' +
                    '&callback=' + callbackName;

                window[callbackName] = function (data) {
                    delete window[callbackName];
                    if (script.parentNode) document.body.removeChild(script);
                    // Resolve with full data object so C# can inspect all keys
                    resolve(data);
                };

                var script = document.createElement('script');
                script.src = url;
                script.onerror = function () {
                    delete window[callbackName];
                    if (script.parentNode) document.body.removeChild(script);
                    reject(new Error('PSKReporter load failed'));
                };

                setTimeout(function () {
                    if (window[callbackName]) {
                        delete window[callbackName];
                        if (script.parentNode) document.body.removeChild(script);
                        reject(new Error('PSKReporter timeout'));
                    }
                }, 15000);

                document.body.appendChild(script);
            });
        };
    </script>

</body>

</html>
